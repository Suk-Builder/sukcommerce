global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # ─── Gateway ──────────────────────────────────────────────────────────
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:3000']
    metrics_path: /metrics
    scrape_interval: 10s

  # ─── User Service ─────────────────────────────────────────────────────
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3001']
    metrics_path: /metrics
    scrape_interval: 15s

  # ─── Product Service ──────────────────────────────────────────────────
  - job_name: 'product-service'
    static_configs:
      - targets: ['product-service:3002']
    metrics_path: /metrics
    scrape_interval: 15s

  # ─── Order Service ────────────────────────────────────────────────────
  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:3003']
    metrics_path: /metrics
    scrape_interval: 15s

  # ─── Payment Service ──────────────────────────────────────────────────
  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:3004']
    metrics_path: /metrics
    scrape_interval: 15s

  # ─── Notification Service ─────────────────────────────────────────────
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:3005']
    metrics_path: /metrics
    scrape_interval: 15s

  # ─── Prometheus self ──────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
