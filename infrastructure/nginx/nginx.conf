# SukCommerce — API Gateway (Nginx)
# 负载均衡 + 限流 + SSL + 健康检查

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ─── 基础配置 ───
    include /etc/nginx/mime.types;
    default_type application/json;

    log_format json_analytics escape=json
        '{"time":"$time_iso8601","request_id":"$request_id",'
        '"remote_addr":"$remote_addr","method":"$request_method",'
        '"uri":"$uri","status":$status,"duration":$request_time,'
        '"bytes_sent":$bytes_sent,"user_agent":"$http_user_agent",'
        '"service":"$upstream_addr","cache":"$upstream_cache_status"}';

    access_log /var/log/nginx/access.log json_analytics;

    # ─── 限流配置 ───
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ─── 上游服务 ───
    upstream gateway_cluster {
        least_conn;
        server gateway:3000 weight=5;
        server gateway:3000 weight=5;
        keepalive 32;
    }

    # ─── 健康检查 ───
    server {
        listen 8080;
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx"}';
            add_header Content-Type application/json;
        }
    }

    # ─── HTTPS 主入口 ───
    server {
        listen 443 ssl http2;
        server_name api.sukcommerce.com;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

        # 请求ID追踪
        add_header X-Request-ID $request_id always;
        proxy_set_header X-Request-ID $request_id;

        # 全局限流
        limit_req zone=api burst=20 nodelay;
        limit_conn addr 10;

        # 超时配置
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;

        # ─── 路由 ───
        location /api/v1/ {
            proxy_pass http://gateway_cluster/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 缓存静态资源
            location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
                proxy_pass http://gateway_cluster;
                proxy_cache_valid 200 1h;
                expires 1h;
            }
        }

        # SSE 流式接口（长连接）
        location /api/v1/chat/ {
            proxy_pass http://gateway_cluster/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 3600s;
            proxy_buffering off;
            proxy_cache off;
        }

        # WebSocket 支持
        location /api/v1/ws/ {
            proxy_pass http://gateway_cluster/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 认证接口（更严格限流）
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://gateway_cluster/;
            proxy_http_version 1.1;
        }
    }

    # ─── HTTP 跳转 HTTPS ───
    server {
        listen 80;
        server_name api.sukcommerce.com;
        return 301 https://$server_name$request_uri;
    }
}
