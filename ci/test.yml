name: CI - Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  DB_HOST: localhost
  DB_PORT: 5432
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  DB_NAME: sukcommerce_test
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  JWT_SECRET: test-jwt-secret-for-ci-only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            services/**/package-lock.json
            frontend-admin/package-lock.json
            frontend-store/package-lock.json

      - name: Install & lint Gateway
        working-directory: services/gateway
        run: |
          npm ci
          npm run lint

      - name: Install & lint User Service
        working-directory: services/user-service
        run: |
          npm ci
          npm run lint

      - name: Install & lint Product Service
        working-directory: services/product-service
        run: |
          npm ci
          npm run lint

      - name: Install & lint Order Service
        working-directory: services/order-service
        run: |
          npm ci
          npm run lint

      - name: Install & lint Payment Service
        working-directory: services/payment-service
        run: |
          npm ci
          npm run lint

      - name: Install & lint Notification Service
        working-directory: services/notification-service
        run: |
          npm ci
          npm run lint

      - name: Install & lint Frontend Admin
        working-directory: frontend-admin
        run: |
          npm ci
          npm run lint

      - name: Install & lint Frontend Store
        working-directory: frontend-store
        run: |
          npm ci
          npm run lint

  test:
    name: Test All Services
    runs-on: ubuntu-latest
    needs: lint
    if: always() && (needs.lint.result == 'success')

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: true
      matrix:
        service:
          - gateway
          - user-service
          - product-service
          - order-service
          - payment-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 && break
            echo "Waiting for PostgreSQL... ($i)"
            sleep 1
          done

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            redis-cli -h localhost -p 6379 ping && break
            echo "Waiting for Redis... ($i)"
            sleep 1
          done

      - name: Install dependencies for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run database migrations for ${{ matrix.service }}
        if: matrix.service != 'gateway'
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f "prisma/schema.prisma" ]; then
            npx prisma migrate deploy
          elif [ -f "scripts/migrate.js" ]; then
            node scripts/migrate.js
          fi
        env:
          DATABASE_URL: postgres://${{ env.DB_USERNAME }}:${{ env.DB_PASSWORD }}@${{ env.DB_HOST }}:${{ env.DB_PORT }}/${{ env.DB_NAME }}

      - name: Run unit tests for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: npm run test:unit -- --coverage
        env:
          NODE_ENV: test
          DB_HOST: ${{ env.DB_HOST }}
          DB_PORT: ${{ env.DB_PORT }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_NAME: ${{ env.DB_NAME }}
          DATABASE_URL: postgres://${{ env.DB_USERNAME }}:${{ env.DB_PASSWORD }}@${{ env.DB_HOST }}:${{ env.DB_PORT }}/${{ env.DB_NAME }}
          REDIS_HOST: ${{ env.REDIS_HOST }}
          REDIS_PORT: ${{ env.REDIS_PORT }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          SMTP_HOST: localhost
          SMTP_PORT: 587

      - name: Run integration tests for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: npm run test:integration -- --coverage
        env:
          NODE_ENV: test
          DB_HOST: ${{ env.DB_HOST }}
          DB_PORT: ${{ env.DB_PORT }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_NAME: ${{ env.DB_NAME }}
          DATABASE_URL: postgres://${{ env.DB_USERNAME }}:${{ env.DB_PASSWORD }}@${{ env.DB_HOST }}:${{ env.DB_PORT }}/${{ env.DB_NAME }}
          REDIS_HOST: ${{ env.REDIS_HOST }}
          REDIS_PORT: ${{ env.REDIS_PORT }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          SMTP_HOST: localhost
          SMTP_PORT: 587

      - name: Upload coverage report for ${{ matrix.service }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/
          retention-days: 7

  test-notification:
    name: Test Notification Service
    runs-on: ubuntu-latest
    needs: lint
    if: always() && (needs.lint.result == 'success')

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/notification-service/package-lock.json

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 && break
            echo "Waiting for PostgreSQL... ($i)"
            sleep 1
          done

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            redis-cli -h localhost -p 6379 ping && break
            echo "Waiting for Redis... ($i)"
            sleep 1
          done

      - name: Install dependencies for notification-service
        working-directory: services/notification-service
        run: npm ci

      - name: Run unit tests for notification-service
        working-directory: services/notification-service
        run: npm run test:unit -- --coverage
        env:
          NODE_ENV: test
          DB_HOST: ${{ env.DB_HOST }}
          DB_PORT: ${{ env.DB_PORT }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_NAME: ${{ env.DB_NAME }}
          DATABASE_URL: postgres://${{ env.DB_USERNAME }}:${{ env.DB_PASSWORD }}@${{ env.DB_HOST }}:${{ env.DB_PORT }}/${{ env.DB_NAME }}
          REDIS_HOST: ${{ env.REDIS_HOST }}
          REDIS_PORT: ${{ env.REDIS_PORT }}
          SMTP_HOST: localhost
          SMTP_PORT: 587
          SMTP_USER: test@example.com
          SMTP_PASS: test-password

      - name: Upload coverage report for notification-service
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-notification-service
          path: services/notification-service/coverage/
          retention-days: 7
