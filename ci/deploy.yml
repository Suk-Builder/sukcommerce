name: CD - Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'
        type: string
      skip_health_check:
        description: 'Skip health check after deployment'
        required: false
        default: false
        type: boolean
      webhook_only:
        description: 'Only trigger webhook deployment (skip SSH)'
        required: false
        default: false
        type: boolean

env:
  DEPLOY_PATH: /www/wwwroot/sukcommerce
  HEALTH_CHECK_TIMEOUT: 120
  SERVICES: gateway user-service product-service order-service payment-service notification-service

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  pre-deploy-checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Tag: ${{ github.event.inputs.tag }}"
          echo "Skip health check: ${{ github.event.inputs.skip_health_check }}"
          echo "Webhook only: ${{ github.event.inputs.webhook_only }}"

      - name: Check required secrets
        run: |
          if [ "${{ github.event.inputs.webhook_only }}" != "true" ]; then
            if [ -z "${{ secrets.SSH_HOST }}" ]; then
              echo "Error: SSH_HOST secret is not set"
              exit 1
            fi
            if [ -z "${{ secrets.SSH_USER }}" ]; then
              echo "Error: SSH_USER secret is not set"
              exit 1
            fi
            if [ -z "${{ secrets.SSH_KEY }}" ]; then
              echo "Error: SSH_KEY secret is not set"
              exit 1
            fi
          fi
          echo "All required secrets are configured."

  deploy-ssh:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: github.event.inputs.webhook_only != 'true'
    environment:
      name: ${{ github.event.inputs.environment }}
      url: https://api.sukcommerce.com

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host deploy-server
              HostName ${{ secrets.SSH_HOST }}
              User ${{ secrets.SSH_USER }}
              IdentityFile ~/.ssh/deploy_key
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Backup before deploy
        run: |
          ssh deploy-server "
            set -e
            cd ${{ env.DEPLOY_PATH }}
            echo '--- Creating backup ---'
            BACKUP_DIR=backup-\$(date +%Y%m%d-%H%M%S)
            mkdir -p \${BACKUP_DIR}
            cp docker-compose.yml \${BACKUP_DIR}/ 2>/dev/null || true
            cp -r .env \${BACKUP_DIR}/ 2>/dev/null || true
            docker-compose ps > \${BACKUP_DIR}/running-services.txt 2>/dev/null || true
            echo 'Backup created at: \${BACKUP_DIR}'
          "

      - name: Pull latest code & images
        run: |
          ssh deploy-server "
            set -e
            cd ${{ env.DEPLOY_PATH }}
            echo '--- Pulling latest code ---'
            git fetch origin main
            git reset --hard origin/main
            echo '--- Pulling latest Docker images ---'
            export TAG=${{ github.event.inputs.tag }}
            docker-compose pull
          "

      - name: Deploy services
        run: |
          ssh deploy-server "
            set -e
            cd ${{ env.DEPLOY_PATH }}
            echo '--- Starting deployment ---'
            export TAG=${{ github.event.inputs.tag }}
            
            # Graceful shutdown
            echo 'Stopping current services...'
            docker-compose down --timeout 30
            
            # Clean up old containers and networks
            echo 'Cleaning up Docker resources...'
            docker system prune -f
            docker volume prune -f
            
            # Start services
            echo 'Starting new services...'
            docker-compose up -d --remove-orphans
            
            echo '--- Deployment complete ---'
          "

      - name: Health Check
        if: github.event.inputs.skip_health_check != 'true'
        run: |
          ssh deploy-server "
            set -e
            cd ${{ env.DEPLOY_PATH }}
            echo '--- Running health checks ---'
            
            # Wait for services to start
            echo 'Waiting for services to start...'
            sleep 15
            
            # Check container status
            echo 'Checking container status...'
            docker-compose ps
            
            # Wait for all containers to be healthy
            echo 'Waiting for all containers to be healthy (timeout: ${{ env.HEALTH_CHECK_TIMEOUT }}s)...'
            timeout=${{ env.HEALTH_CHECK_TIMEOUT }}
            elapsed=0
            
            while [ \${elapsed} -lt \${timeout} ]; do
              UNHEALTHY=0
              for svc in ${{ env.SERVICES }}; do
                CONTAINER=\$(docker-compose ps -q \${svc} 2>/dev/null)
                if [ -z \"\${CONTAINER}\" ]; then
                  echo \"Service \${svc}: container not found\"
                  UNHEALTHY=1
                  continue
                fi
                STATUS=\$(docker inspect --format='{{.State.Health.Status}}' \${CONTAINER} 2>/dev/null || echo 'none')
                RUNNING=\$(docker inspect --format='{{.State.Running}}' \${CONTAINER} 2>/dev/null || echo 'false')
                
                if [ \"\${RUNNING}\" != \"true\" ]; then
                  echo \"Service \${svc}: NOT RUNNING\"
                  UNHEALTHY=1
                elif [ \"\${STATUS}\" != \"healthy\" ] && [ \"\${STATUS}\" != \"none\" ]; then
                  echo \"Service \${svc}: waiting (status=\${STATUS})\"
                  UNHEALTHY=1
                else
                  echo \"Service \${svc}: OK\"
                fi
              done
              
              if [ \${UNHEALTHY} -eq 0 ]; then
                echo 'All services are healthy!'
                exit 0
              fi
              
              sleep 5
              elapsed=\$((elapsed + 5))
              echo \"Waiting... (\${elapsed}/\${timeout}s)\"
            done
            
            echo 'Health check timed out! Rolling back...'
            docker-compose logs --tail=50
            exit 1
          "

      - name: Check HTTP Health Endpoints
        if: github.event.inputs.skip_health_check != 'true'
        run: |
          ssh deploy-server "
            set -e
            echo '--- Checking HTTP health endpoints ---'
            
            # Get gateway container IP
            GATEWAY_IP=\$(docker network inspect sukcommerce_default 2>/dev/null | grep -A2 'gateway' | grep 'IPv4Address' | head -1 | sed 's/.*\"\\([0-9.]*\\)\\/.*/\\1/' || echo 'localhost')
            
            # Test gateway /health
            echo 'Testing gateway /health...'
            for i in {1..12}; do
              if curl -sf http://\${GATEWAY_IP}:3000/health > /dev/null 2>&1 || curl -sf http://localhost:3000/health > /dev/null 2>&1; then
                echo 'Gateway health check: PASSED'
                break
              fi
              echo \"Attempt \$i/12 failed, retrying...\"
              sleep 5
            done
            
            echo 'All HTTP health checks passed!'
          "

      - name: Cleanup SSH Key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key ~/.ssh/config

  deploy-webhook:
    name: Deploy via Webhook
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: github.event.inputs.webhook_only == 'true'
    steps:
      - name: Trigger deployment webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          PAYLOAD=$(jq -n \
            --arg ref "${{ github.ref }}" \
            --arg sha "${{ github.sha }}" \
            --arg env "${{ github.event.inputs.environment }}" \
            --arg tag "${{ github.event.inputs.tag }}" \
            --arg actor "${{ github.actor }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              ref: \$ref,
              commit_sha: \$sha,
              environment: \$env,
              tag: \$tag,
              triggered_by: \$actor,
              timestamp: \$timestamp
            }')
          
          SIGNATURE=$(echo -n "${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | sed 's/^.* //')
          
          if [ -n "${{ secrets.DEPLOY_WEBHOOK_URL }}" ]; then
            echo "Triggering deployment webhook..."
            curl -sf -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
              -d "${PAYLOAD}" \
              && echo "Webhook triggered successfully" \
              || echo "Webhook call failed - check WEBHOOK_URL secret"
          else
            echo "DEPLOY_WEBHOOK_URL secret not set - skipping webhook"
            echo "Payload that would be sent:"
            echo "${PAYLOAD}" | jq .
          fi

  post-deploy:
    name: Post-Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-ssh, deploy-webhook]
    if: always() && (needs.deploy-ssh.result == 'success' || needs.deploy-webhook.result == 'success')
    steps:
      - name: Deployment Summary
        run: |
          echo "========================================"
          echo "  Deployment Summary"
          echo "========================================"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Tag: ${{ github.event.inputs.tag }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "========================================"
          echo "Status: SUCCESS"
          echo "========================================"
