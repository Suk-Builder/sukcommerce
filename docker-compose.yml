#############################################
# SukCommerce — 微服务电商SaaS平台
# Docker Compose 生产编排
#############################################
version: '3.8'

networks:
  sukcommerce:
    driver: bridge

volumes:
  postgres-user:
  postgres-product:
  postgres-order:
  redis-data:
  es-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:

services:
  # ─── API Gateway ───
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
    networks:
      - sukcommerce
    restart: always

  # ─── 服务网关 ───
  gateway:
    build: ./services/gateway
    environment:
      - NODE_ENV=production
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - ORDER_SERVICE_URL=http://order-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_WINDOW=60000
      - RATE_LIMIT_MAX=100
    depends_on:
      - redis
      - rabbitmq
    networks:
      - sukcommerce
    restart: always
    deploy:
      replicas: 2

  # ─── 用户服务 ───
  user-service:
    build: ./services/user-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres-user
      - DB_PORT=5432
      - DB_NAME=userdb
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - postgres-user
      - redis
      - rabbitmq
    networks:
      - sukcommerce
    restart: always
    deploy:
      replicas: 2

  # ─── 商品服务 ───
  product-service:
    build: ./services/product-service
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DB_HOST=postgres-product
      - DB_PORT=5432
      - DB_NAME=productdb
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - ES_HOST=elasticsearch:9200
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - postgres-product
      - elasticsearch
      - redis
      - rabbitmq
    networks:
      - sukcommerce
    restart: always
    deploy:
      replicas: 2

  # ─── 订单服务 ───
  order-service:
    build: ./services/order-service
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DB_HOST=postgres-order
      - DB_PORT=5432
      - DB_NAME=orderdb
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - USER_SERVICE_URL=http://user-service:3001
    depends_on:
      - postgres-order
      - redis
      - rabbitmq
    networks:
      - sukcommerce
    restart: always
    deploy:
      replicas: 2

  # ─── 支付服务 ───
  payment-service:
    build: ./services/payment-service
    environment:
      - NODE_ENV=production
      - PORT=3004
      - DB_HOST=postgres-order
      - DB_PORT=5432
      - DB_NAME=paymentdb
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY}
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - postgres-order
      - rabbitmq
    networks:
      - sukcommerce
    restart: always

  # ─── 通知服务 ───
  notification-service:
    build: ./services/notification-service
    environment:
      - NODE_ENV=production
      - PORT=3005
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMS_ACCESS_KEY=${SMS_ACCESS_KEY}
      - SMS_SECRET_KEY=${SMS_SECRET_KEY}
    depends_on:
      - rabbitmq
    networks:
      - sukcommerce
    restart: always

  # ─── 数据库 ───
  postgres-user:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=userdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-user:/var/lib/postgresql/data
    networks:
      - sukcommerce

  postgres-product:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=productdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-product:/var/lib/postgresql/data
    networks:
      - sukcommerce

  postgres-order:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=orderdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-order:/var/lib/postgresql/data
    networks:
      - sukcommerce

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - sukcommerce

  # ─── Elasticsearch ───
  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - sukcommerce

  # ─── RabbitMQ ───
  rabbitmq:
    image: rabbitmq:3-alpine-management
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "15672:15672"  # 管理界面
    networks:
      - sukcommerce

  # ─── 监控 ───
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - sukcommerce

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - sukcommerce
