version: '3.8'

services:
  # ─── Nginx ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/var/www/static:ro
      - nginx_logs:/var/log/nginx
    networks:
      - sukcommerce
    depends_on:
      - gateway
    restart: unless-stopped

  # ─── API Gateway (x2) ─────────────────────────────────────────────────
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: gateway
    environment:
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - ORDER_SERVICE_URL=http://order-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
    ports:
      - "3000:3000"
    networks:
      - sukcommerce
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "node", "-e", "require('node-fetch')('http://localhost:3000/health').then(r => {if(!r.ok) throw new Error('unhealthy')})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── User Service ─────────────────────────────────────────────────────
  user-service:
    image: node:18-alpine
    container_name: user-service
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://postgres:postgres@postgres-user:5432/user_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "3001:3001"
    networks:
      - sukcommerce
    depends_on:
      - postgres-user
      - redis
    restart: unless-stopped

  # ─── Product Service ──────────────────────────────────────────────────
  product-service:
    image: node:18-alpine
    container_name: product-service
    environment:
      - PORT=3002
      - DATABASE_URL=postgres://postgres:postgres@postgres-product:5432/product_db
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379
    ports:
      - "3002:3002"
    networks:
      - sukcommerce
    depends_on:
      - postgres-product
      - elasticsearch
      - redis
    restart: unless-stopped

  # ─── Order Service ────────────────────────────────────────────────────
  order-service:
    image: node:18-alpine
    container_name: order-service
    environment:
      - PORT=3003
      - DATABASE_URL=postgres://postgres:postgres@postgres-order:5432/order_db
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
    ports:
      - "3003:3003"
    networks:
      - sukcommerce
    depends_on:
      - postgres-order
      - redis
      - rabbitmq
    restart: unless-stopped

  # ─── Payment Service ──────────────────────────────────────────────────
  payment-service:
    image: node:18-alpine
    container_name: payment-service
    environment:
      - PORT=3004
      - DATABASE_URL=postgres://postgres:postgres@postgres-order:5432/payment_db
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
    ports:
      - "3004:3004"
    networks:
      - sukcommerce
    depends_on:
      - postgres-order
      - redis
      - rabbitmq
    restart: unless-stopped

  # ─── Notification Service ─────────────────────────────────────────────
  notification-service:
    image: node:18-alpine
    container_name: notification-service
    environment:
      - PORT=3005
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
    ports:
      - "3005:3005"
    networks:
      - sukcommerce
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  # ─── PostgreSQL: User ─────────────────────────────────────────────────
  postgres-user:
    image: postgres:15-alpine
    container_name: postgres-user
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=user_db
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - sukcommerce
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL: Product ──────────────────────────────────────────────
  postgres-product:
    image: postgres:15-alpine
    container_name: postgres-product
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=product_db
    volumes:
      - postgres_product_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - sukcommerce
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL: Order/Payment ────────────────────────────────────────
  postgres-order:
    image: postgres:15-alpine
    container_name: postgres-order
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=order_db
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - sukcommerce
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - sukcommerce
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Elasticsearch ────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - sukcommerce
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── RabbitMQ ─────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - sukcommerce
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Prometheus ───────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - sukcommerce
    restart: unless-stopped

  # ─── Grafana ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://localhost:3100
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3100:3000"
    networks:
      - sukcommerce
    depends_on:
      - prometheus
    restart: unless-stopped

# ─── Networks ───────────────────────────────────────────────────────────
networks:
  sukcommerce:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ─── Volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_user_data:
    driver: local
  postgres_product_data:
    driver: local
  postgres_order_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  static_files:
    driver: local
  nginx_logs:
    driver: local
